{{ $paginator := .Paginator }}
{{ if gt $paginator.TotalPages 1 }}
<nav class="pagination" aria-label="Pagination">
  {{ if $paginator.HasPrev }}
  <a class="pagination-button" href="{{ $paginator.Prev.URL }}">Previous</a>
  {{ else }}
  <span class="pagination-button is-disabled" aria-hidden="true">Previous</span>
  {{ end }}
  <span class="pagination-count">{{ $paginator.PageNumber }} / {{ $paginator.TotalPages }}</span>
  {{ if $paginator.HasNext }}
  <a class="pagination-button" href="{{ $paginator.Next.URL }}">Next</a>
  {{ else }}
  <span class="pagination-button is-disabled" aria-hidden="true">Next</span>
  {{ end }}
</nav>
{{ end }}
